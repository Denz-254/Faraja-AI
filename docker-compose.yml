services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: faraja
      POSTGRES_PASSWORD: faraja
      POSTGRES_DB: faraja
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faraja -d faraja"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${FARAJA_BACKEND_IMAGE:-faraja-backend:local}
    build:
      context: ./backend
      tags:
        - faraja-backend:local
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://faraja:faraja@db:5432/faraja
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${FARAJA_FRONTEND_IMAGE:-faraja-frontend:local}
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      tags:
        - faraja-frontend:local
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
